name: GymTwin

# Marks the project as validated against the current Xcode, which silences the
# "Update to recommended settings" prompt (the project is generated by XcodeGen,
# so this must live here to survive regeneration).
attributes:
  LastUpgradeCheck: "2650"
  LastSwiftUpdateCheck: "2650"

options:
  bundleIdPrefix: com.markusvaitl.gymtwin
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: R68833AU53
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  GymTwin:
    type: application
    platform: iOS
    sources:
      - path: GymTwinShared
      - path: GymTwin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markusvaitl.gymtwin
        INFOPLIST_FILE: GymTwin/Info.plist
        CODE_SIGN_ENTITLEMENTS: GymTwin/GymTwin.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: GymTwinWatch
        embed: true
      - target: GymTwinWidgets
        embed: true

  GymTwinWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: GymTwinShared/Shared/DesignTokens.swift
      - path: GymTwinShared/Persistence/AppGroup.swift
      - path: GymTwinShared/Widget
      - path: GymTwinWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markusvaitl.gymtwin.widgets
        INFOPLIST_FILE: GymTwinWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: GymTwinWidgets/GymTwinWidgets.entitlements

  GymTwinWatch:
    type: application
    platform: watchOS
    sources:
      - path: GymTwinShared
      - path: GymTwinWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markusvaitl.gymtwin.watchkitapp
        INFOPLIST_FILE: GymTwinWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: GymTwinWatch/GymTwinWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"

  GymTwinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GymTwinTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markusvaitl.gymtwin.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GymTwin

  GymTwinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GymTwinUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markusvaitl.gymtwin.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GymTwin

schemes:
  GymTwin:
    build:
      targets:
        GymTwin: all
    test:
      targets:
        - GymTwinTests
    run:
      config: Debug
  GymTwinWatch:
    build:
      targets:
        GymTwinWatch: all
    run:
      config: Debug
  GymTwinUITests:
    build:
      targets:
        GymTwin: all
        GymTwinUITests: all
    test:
      targets:
        - GymTwinUITests
    run:
      config: Debug
